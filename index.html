<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Snake</title>
    <link rel="stylesheet" href="./snake.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="hud" role="status" aria-live="polite">
        <div class="hud-item"><span class="label">Score</span><span id="score">0</span></div>
        <div class="title">SNAKE</div>
        <div class="hud-item"><span class="label">High</span><span id="high-score">0</span></div>
      </header>
      <canvas
        id="board"
        width="1200"
        height="1200"
        tabindex="0"
        aria-label="Snake game board, 20 by 20 grid. Use arrow keys or WASD to move, space to pause, R to restart."
      ></canvas>
      <p class="hint">Arrows / WASD to move &middot; Space to pause &middot; R to restart</p>
    </main>
    <script src="./snake.js"></script>
  </body>
</html>
